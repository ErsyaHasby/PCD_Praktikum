{% extends "base.html" %}
{% block title %}Fourier Transform Citra{% endblock %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center">Fourier Transform pada Citra</h2>
    <div class="alert alert-info mt-3">
        Proses ini menampilkan spektrum magnitudo dari domain frekuensi citra (hasil FFT pada citra grayscale).
    </div>

    <form action="/fourier/" enctype="multipart/form-data" method="post" class="mt-4">
        <div class="mb-3">
            <label for="file" class="form-label">Pilih Gambar:</label>
            <input id="file" name="file" type="file" accept="image/*" class="form-control" required />
        </div>

        <div class="text-center">
            <input type="submit" value="Terapkan Fourier Transform" class="btn btn-primary" />
        </div>
    </form>
</div>
{% endblock %}
